name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Windows"
            platform: "windows-latest"
            args: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install
      - name: Build Tauri App
        run: bun run tauri build --bundles nsis,msi --target x86_64-pc-windows-msvc ${{ matrix.args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }} # 如果你有签名配置记得加上
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Upload Release Assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Release v__VERSION__"
          releaseBody: "See the assets to download this version."
          releaseDraft: true
          prerelease: false
          appDirectory: . 
          bundlePath: "src-tauri/target/x86_64-pc-windows-msvc/release/bundle" 

      - name: Release summary
        if: success()
        shell: bash
        run: |
          echo "## Tauri Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Platform: ${{ matrix.name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build completed successfully via Bun." >> $GITHUB_STEP_SUMMARY